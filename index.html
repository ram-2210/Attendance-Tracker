<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance & Payroll Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username (e.g., Ramkumar or admin)">
        <select id="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="login()">Login</button>
    </div>

    <div id="userDashboard" class="hidden">
        <h2>Employee Dashboard</h2>
        <div class="profile-card">
            <p><strong>Name:</strong> <span id="profileName"></span></p>
            <p><strong>Role:</strong> <span id="profileRole"></span></p>
            <p><strong>Workplace:</strong> Tech Dept</p>
        </div>
        
        <p><strong>Status:</strong> <span id="workStatus">Not Clocked In</span></p>
        <button onclick="clockIn()" id="btnIn">Clock In</button>
        <button onclick="clockOut()" id="btnOut" class="hidden" class="btn-danger">Clock Out</button>
        
        <div id="salaryReport" class="hidden">
            <h3>Today's Report</h3>
            <p>Total Hours: <span id="totalHours">0</span></p>
            <p>Overtime: <span id="overtimeHours">0</span></p>
            <p><strong>Total Salary: ₹<span id="totalSalary">0</span></strong></p>
        </div>
        <button onclick="logout()" class="btn-secondary">Logout</button>
    </div>

    <div id="adminDashboard" class="hidden">
        <h2>Admin Dashboard</h2>
        <p>Welcome, Admin. System is running smoothly.</p>
        <p><em>(In a real setup, employee data logs would generate here)</em></p>
        <button onclick="logout()" class="btn-secondary">Logout</button>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
