<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Service System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #495057;
            --bg-light: #f8f9fa;
            --border-radius-custom: 8px;
            --transition-speed: 0.2s;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: #212529;
            -webkit-font-smoothing: antialiased;
        }

        .card, .btn, .form-control, .form-select {
            transition: all var(--transition-speed) ease-in-out;
        }

        /* Login Page Pinned Card Customization */
        .pinned-card {
            border-radius: var(--border-radius-custom);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08) !important;
        }

        .pinned-card .form-control:focus,
        .pinned-card .form-select:focus {
            border-color: #a3cfbb;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.15);
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm border-0 pinned-card">
                    <div class="card-body p-4 text-center">
                        <img src="assets/images/logo.png" alt="Company Logo" class="mb-3 img-fluid" style="max-height: 60px;" onerror="this.src='https://via.placeholder.com/150x60?text=Field+Service'">
                        
                        <h4 class="card-title mb-4 fw-bold text-secondary">Sign In</h4>
                        
                        <form id="loginForm" novalidate>
                            <div class="mb-3 text-start">
                                <label for="username" class="form-label small fw-semibold text-muted">Username or Email</label>
                                <input type="text" class="form-control" id="username" required placeholder="Enter your username">
                            </div>
                            
                            <div class="mb-3 text-start">
                                <label for="password" class="form-label small fw-semibold text-muted">Password</label>
                                <input type="password" class="form-control" id="password" required placeholder="••••••••">
                            </div>

                            <div class="mb-4 text-start">
                                <label for="role" class="form-label small fw-semibold text-muted">Portal Access</label>
                                <select class="form-select" id="role" required>
                                    <option value="" disabled selected>Select your role...</option>
                                    <option value="admin">Administrator</option>
                                    <option value="worker">Field Worker</option>
                                    <option value="customer">Customer Portal</option>
                                </select>
                            </div>

                            <div id="loginErrorMessage" class="alert alert-danger d-none small py-2" role="alert">
                                Invalid credentials. Please try again.
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                Authenticate
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3 text-muted small">
                    &copy; 2026 Field Service System. All rights reserved.
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
